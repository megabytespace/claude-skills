name: Validate & Publish Skills

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate skills
        run: bash scripts/validate-skills.sh

      - name: Check doc counts
        run: |
          EXPECTED=$(grep -o '[0-9]* reference docs' README.md | grep -o '[0-9]*')
          ACTUAL=0
          for dir in [0-9][0-9]-*/; do
            COUNT=$(find "$dir" -maxdepth 1 -name '*.md' ! -name 'SKILL.md' | wc -l)
            ACTUAL=$((ACTUAL + COUNT))
          done
          echo "Expected: $EXPECTED, Actual: $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Doc count mismatch: README says $EXPECTED but found $ACTUAL"
            exit 1
          fi

      - name: Check SKILL.md submodule alignment
        run: |
          ERRORS=0
          for dir in [0-9][0-9]-*/; do
            SKILL="${dir}SKILL.md"
            [ -f "$SKILL" ] || continue
            IN_SUBMODULES=false
            while IFS= read -r line; do
              if echo "$line" | grep -q '^submodules:'; then
                IN_SUBMODULES=true
                continue
              fi
              if $IN_SUBMODULES; then
                if echo "$line" | grep -q '^  - '; then
                  FILE=$(echo "$line" | sed 's/^  - //')
                  if [ ! -f "${dir}${FILE}" ]; then
                    echo "::error::${SKILL}: submodule ${FILE} not found on disk"
                    ERRORS=$((ERRORS + 1))
                  fi
                elif echo "$line" | grep -q '^---'; then
                  break
                elif ! echo "$line" | grep -q '^  '; then
                  break
                fi
              fi
            done < "$SKILL"
          done
          [ $ERRORS -eq 0 ] || exit 1

  sync-cross-platform:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate cross-platform AGENTS.md
        run: |
          cat > AGENTS.md << 'AGENTSEOF'
          # Emdash Skills — Agent Instructions

          This repository contains 14 skill categories and 94 reference docs for autonomous product building.

          ## Stack
          CF Workers + Hono | Angular 21 + Ionic 8 + PrimeNG 21 | D1/Neon | Drizzle v1 | Clerk | Stripe | Inngest | Resend | Bun | Playwright v1.59+ | PostHog | Sentry

          ## Usage
          Load skills on demand via the skill router (`_router.md`). Each category has a `SKILL.md` with submodules listed in frontmatter.

          ## Key Files
          - `CONVENTIONS.md` — shared constants, patterns, stack config
          - `_router.md` — routes prompts to smallest useful skill subset
          - `SKILL_PROFILES.md` — default bundles by product type (SaaS, API, Marketing, etc.)
          - `llms.txt` — LLM-optimized index of all skills

          ## For AI Coding Tools
          This repo is compatible with the agentskills.io open standard. Skills work in Claude Code, OpenAI Codex, Cursor, GitHub Copilot, VS Code, Windsurf, Augment, OpenHands, Gemini CLI, and 30+ other tools.

          ## Platform Variants (24 total)
          Modern formats: `.cursor/rules/` (MDC) | `.windsurf/rules/` (trigger frontmatter) | `.augment/rules/` (type frontmatter) | `.github/instructions/` (applyTo frontmatter) | `.openhands/microagents/`
          Legacy formats: `.cursorrules` | `.windsurfrules` | `.clinerules` | `.rules` | `.augment-guidelines` | `.aider-conventions.md` | `.github/copilot-instructions.md`
          Named formats: `AGENTS.md` | `GEMINI.md` | `AMP.md` | `CODEX.md` | `replit.md`
          Directory formats: `.amazonq/rules/` | `.junie/` | `.trae/rules/` | `.tabnine/guidelines/` | `.kilo/rules/` | `.roo/rules/` | `.continue/rules/` | `.agents/skills/`

          Install: `claude plugin install megabytespace/claude-skills`
          Codex: Clone into `~/.codex/skills/` or `.agents/skills/`
          npm: `npm i @megabytespace/claude-skills`
          AGENTSEOF

      - name: Generate .cursorrules
        run: |
          cat > .cursorrules << 'CURSOREOF'
          # Emdash Skills for Cursor

          Load CONVENTIONS.md for stack defaults. Load _router.md for skill routing.
          14 categories (01-14), 94 reference docs, 18 agents.

          ## Stack
          CF Workers+Hono | Angular 21+Ionic 8+PrimeNG 21 | D1/Neon | Drizzle v1 | Clerk | Stripe | Inngest | Resend | Bun | Playwright v1.59+ | PostHog | Sentry

          ## Rules
          - TypeScript strict, never `any`, prefer `interface` over `type`
          - Hono inline handlers for RPC type inference
          - Zod validation on all inputs
          - TDD: failing test first, Playwright 6 breakpoints
          - Dark-first design, #060610 bg, #00E5FF accent
          - Deploy to CF Workers, purge CDN after every deploy

          See CONVENTIONS.md for full patterns.
          CURSOREOF

      - name: Generate platform variants
        run: |
          cp .cursorrules .windsurfrules
          cp .cursorrules .clinerules
          sed 's/for Cursor/for Gemini/' .cursorrules > GEMINI.md
          mkdir -p .github
          sed 's/for Cursor/for GitHub Copilot/' .cursorrules > .github/copilot-instructions.md
          mkdir -p .amazonq/rules
          sed 's/for Cursor/for Amazon Q/' .cursorrules > .amazonq/rules/cloudflare-workers-hono-angular-saas.md
          sed 's/for Cursor/for Zed/' .cursorrules > .rules
          mkdir -p .junie
          sed 's/for Cursor/for JetBrains Junie/' .cursorrules > .junie/guidelines.md
          sed 's/for Cursor/for Augment Code/' .cursorrules > .augment-guidelines
          sed 's/for Cursor/for Aider/' .cursorrules > .aider-conventions.md
          sed 's/for Cursor/for Amp/' .cursorrules > AMP.md
          sed 's/for Cursor/for Codex/' .cursorrules > CODEX.md
          # Trae IDE (ByteDance)
          mkdir -p .trae/rules
          sed 's/for Cursor/for Trae/' .cursorrules > .trae/rules/project_rules.md
          # Tabnine
          mkdir -p .tabnine/guidelines
          sed 's/for Cursor/for Tabnine/' .cursorrules > .tabnine/guidelines/guidelines.md
          # Kilo Code (Roo Code successor)
          mkdir -p .kilo/rules
          sed 's/for Cursor/for Kilo Code/' .cursorrules > .kilo/rules/cloudflare-workers-hono-angular-saas.md
          # Roo Code (predecessor to Kilo, active until May 2026)
          mkdir -p .roo/rules
          sed 's/for Cursor/for Roo Code/' .cursorrules > .roo/rules/cloudflare-workers-hono-angular-saas.md
          # Continue.dev
          mkdir -p .continue/rules
          sed 's/for Cursor/for Continue/' .cursorrules > .continue/rules/cloudflare-workers-hono-angular-saas.md
          # Replit Agent
          sed 's/for Cursor/for Replit/' .cursorrules > replit.md
          # Cursor modern format (.cursor/rules/*.mdc with MDC frontmatter)
          mkdir -p .cursor/rules
          cat > .cursor/rules/emdash-skills.mdc << 'MDCEOF'
          ---
          description: "Emdash Skills — 14-category product-building OS. CF Workers+Hono, Angular, D1, Drizzle, Clerk, Stripe."
          alwaysApply: true
          ---
          # Emdash Skills for Cursor

          Load CONVENTIONS.md for stack defaults. Load _router.md for skill routing.
          14 categories (01-14), 94 reference docs, 18 agents.

          ## Stack
          CF Workers+Hono | Angular 21+Ionic 8+PrimeNG 21 | D1/Neon | Drizzle v1 | Clerk | Stripe | Inngest | Resend | Bun | Playwright v1.59+ | PostHog | Sentry

          ## Rules
          - TypeScript strict, never `any`, prefer `interface` over `type`
          - Hono inline handlers for RPC type inference
          - Zod validation on all inputs
          - TDD: failing test first, Playwright 6 breakpoints
          - Dark-first design, #060610 bg, #00E5FF accent
          - Deploy to CF Workers, purge CDN after every deploy

          See CONVENTIONS.md for full patterns.
          MDCEOF
          # Windsurf modern format (.windsurf/rules/*.md with trigger frontmatter)
          mkdir -p .windsurf/rules
          cat > .windsurf/rules/emdash-skills.md << 'WSEOF'
          ---
          trigger: always_on
          description: "Emdash Skills — 14-category product-building OS for Windsurf."
          ---
          # Emdash Skills for Windsurf

          Load CONVENTIONS.md for stack defaults. Load _router.md for skill routing.
          14 categories (01-14), 94 reference docs, 18 agents.

          ## Stack
          CF Workers+Hono | Angular 21+Ionic 8+PrimeNG 21 | D1/Neon | Drizzle v1 | Clerk | Stripe | Inngest | Resend | Bun | Playwright v1.59+ | PostHog | Sentry

          ## Rules
          - TypeScript strict, never `any`, prefer `interface` over `type`
          - Hono inline handlers for RPC type inference
          - Zod validation on all inputs
          - TDD: failing test first, Playwright 6 breakpoints
          - Dark-first design, #060610 bg, #00E5FF accent
          - Deploy to CF Workers, purge CDN after every deploy

          See CONVENTIONS.md for full patterns.
          WSEOF
          # Augment Code modern format (.augment/rules/*.md with type frontmatter)
          mkdir -p .augment/rules
          cat > .augment/rules/emdash-skills.md << 'AUGEOF'
          ---
          type: always_apply
          description: "Emdash Skills — 14-category product-building OS for Augment Code."
          ---
          # Emdash Skills for Augment Code

          Load CONVENTIONS.md for stack defaults. Load _router.md for skill routing.
          14 categories (01-14), 94 reference docs, 18 agents.

          ## Stack
          CF Workers+Hono | Angular 21+Ionic 8+PrimeNG 21 | D1/Neon | Drizzle v1 | Clerk | Stripe | Inngest | Resend | Bun | Playwright v1.59+ | PostHog | Sentry

          ## Rules
          - TypeScript strict, never `any`, prefer `interface` over `type`
          - Hono inline handlers for RPC type inference
          - Zod validation on all inputs
          - TDD: failing test first, Playwright 6 breakpoints
          - Dark-first design, #060610 bg, #00E5FF accent
          - Deploy to CF Workers, purge CDN after every deploy

          See CONVENTIONS.md for full patterns.
          AUGEOF
          # GitHub Copilot path-scoped instructions
          mkdir -p .github/instructions
          cat > .github/instructions/emdash-skills.instructions.md << 'GHIEOF'
          ---
          applyTo: "**"
          ---
          # Emdash Skills for GitHub Copilot

          Load CONVENTIONS.md for stack defaults. Load _router.md for skill routing.
          14 categories (01-14), 94 reference docs, 18 agents.

          ## Stack
          CF Workers+Hono | Angular 21+Ionic 8+PrimeNG 21 | D1/Neon | Drizzle v1 | Clerk | Stripe | Inngest | Resend | Bun | Playwright v1.59+ | PostHog | Sentry

          ## Rules
          - TypeScript strict, never `any`, prefer `interface` over `type`
          - Hono inline handlers for RPC type inference
          - Zod validation on all inputs
          - TDD: failing test first, Playwright 6 breakpoints
          - Dark-first design, #060610 bg, #00E5FF accent
          - Deploy to CF Workers, purge CDN after every deploy

          See CONVENTIONS.md for full patterns.
          GHIEOF
          # OpenHands microagent
          mkdir -p .openhands/microagents
          cat > .openhands/microagents/repo.md << 'OHEOF'
          # Emdash Skills for OpenHands

          Load CONVENTIONS.md for stack defaults. Load _router.md for skill routing.
          14 categories (01-14), 94 reference docs, 18 agents.

          ## Stack
          CF Workers+Hono | Angular 21+Ionic 8+PrimeNG 21 | D1/Neon | Drizzle v1 | Clerk | Stripe | Inngest | Resend | Bun | Playwright v1.59+ | PostHog | Sentry

          ## Rules
          - TypeScript strict, never `any`, prefer `interface` over `type`
          - Hono inline handlers for RPC type inference
          - Zod validation on all inputs
          - TDD: failing test first, Playwright 6 breakpoints
          - Dark-first design, #060610 bg, #00E5FF accent
          - Deploy to CF Workers, purge CDN after every deploy

          See CONVENTIONS.md for full patterns.
          OHEOF

      - name: Generate llms-full.txt
        run: |
          {
            cat llms.txt
            echo ""
            echo "## Full Conventions"
            echo ""
            cat CONVENTIONS.md
          } > llms-full.txt

      - name: Generate Codex .agents/ directory
        run: |
          mkdir -p .agents/skills
          # Symlink each SKILL.md for native Codex discovery
          for dir in [0-9][0-9]-*/; do
            DIRNAME=$(basename "$dir")
            if [ -f "${dir}SKILL.md" ]; then
              cp "${dir}SKILL.md" ".agents/skills/${DIRNAME}.md"
            fi
          done

      - name: Commit cross-platform files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md .cursorrules .windsurfrules .clinerules GEMINI.md \
            .github/copilot-instructions.md .github/instructions/ llms-full.txt \
            .amazonq/ .rules .junie/ .augment-guidelines .augment/ \
            .aider-conventions.md AMP.md CODEX.md .agents/ .trae/ .tabnine/ \
            .kilo/ .roo/ .continue/ .cursor/ .windsurf/ .openhands/ replit.md
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: sync cross-platform rule files [skip ci]"
          git push || true

  publish-npm:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-release:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Emdash Skills $TAG" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-version:refname | head -2 | tail -1)"

  publish-jsr:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Publish to JSR
        run: npx jsr publish --allow-dirty
        continue-on-error: true

  publish-continue-hub:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Publish to Continue Hub (rules.so)
        run: |
          npx rules-cli publish --token "${{ secrets.CONTINUE_HUB_TOKEN }}" 2>/dev/null || echo "Continue Hub publish skipped (no token)"
        continue-on-error: true

  publish-github-skills:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Publish via gh skill (if available)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh extension install github/gh-skill 2>/dev/null || true
          gh skill publish 2>/dev/null || echo "gh skill publish not available yet"
        continue-on-error: true
